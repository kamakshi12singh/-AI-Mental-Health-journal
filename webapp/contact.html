<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Serenity AI team.">
    <title>Contact | Serenity AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🌱 Serenity AI</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <a href="dashboard.html" class="btn-primary">Open Dashboard</a>
    </nav>

    <main>
        <div style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h1>Get in Touch</h1>
                <p class="subtitle">We'd love to hear your feedback, feature requests, or simply how the app has helped you.</p>
            </div>

            <div class="card">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required placeholder="How can we help?">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Your message here..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
                    
                    <div id="formStatus" style="margin-top: 1rem; text-align: center; display: none;" class="badge"></div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Serenity AI Companion. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('formStatus');
            
            // Basic validation
            const email = document.getElementById('email').value;
            if(!email.includes('@')) {
                status.textContent = 'Please enter a valid email.';
                status.className = 'badge error';
                status.style.display = 'inline-block';
                return;
            }

            // Simulate form submission
            status.textContent = 'Sending...';
            status.className = 'badge neutral';
            status.style.display = 'inline-block';
            
            setTimeout(() => {
                status.textContent = 'Message sent successfully! We will get back to you soon.';
                status.className = 'badge success';
                this.reset();
            }, 1500);
        });
    </script>
</body>
</html>
