<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Serenity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Serenity.</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Our Story</a></li>
            <li><a href="services.html">Practice</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="container-narrow">
        <h1 class="editorial-italic" style="text-align: center; margin-top: 4rem;">Let's Connect</h1>
        <p class="subtitle" style="margin: 0 auto 4rem auto; text-align: center;">We'd love to hear how you are finding the practice.</p>

        <form style="margin-bottom: 6rem;">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="Jane Doe" required>
            </div>
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" placeholder="jane@example.com" required>
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea rows="5" placeholder="I wanted to share..." required></textarea>
            </div>
            <div style="text-align: right; margin-top: 2rem;">
                <button type="submit" class="btn-primary">Send Message</button>
            </div>
        </form>
    </main>

    <footer>
        <p>Crafted with intention. &copy; 2026 Serenity.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
