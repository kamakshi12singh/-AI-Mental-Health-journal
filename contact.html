<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Interactive Space</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- GSAP & Lenis -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div class="custom-cursor"></div>

    <svg class="sticker parallax" data-speed="2.5" width="80" height="80" viewBox="0 0 100 100" style="top: 60%; left: 5%;">
        <path d="M50 0 L100 50 L50 100 L0 50 Z" fill="var(--error)" />
    </svg>

    <nav>
        <a href="index.html" class="logo magnetic-btn">Serenity.</a>
        <ul class="nav-links">
            <li><a href="index.html" class="magnetic-btn">Home</a></li>
            <li><a href="about.html" class="magnetic-btn">Story</a></li>
            <li><a href="services.html" class="magnetic-btn">Practice</a></li>
            <li><a href="contact.html" class="magnetic-btn" style="color: var(--primary);">Contact</a></li>
        </ul>
    </nav>

    <main class="container-narrow gsap-reveal">
        <h1 style="text-align: center; margin-top: 4rem; font-size: 4.5rem; letter-spacing: -2px;">Say <span class="serif-italic" style="color: var(--error);">Hello</span> 👋</h1>
        <p class="subtitle" style="margin: 0 auto 4rem auto; text-align: center;">We actually read these.</p>

        <form style="margin-bottom: 6rem; background: var(--bg-alt); padding: 4rem; border-radius: 40px;">
            <div class="form-group">
                <label style="font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; display: block;">Who are you?</label>
                <input type="text" placeholder="Main Character" required>
            </div>
            <div class="form-group" style="margin-top: 2rem;">
                <label style="font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; display: block;">Where can we reach you?</label>
                <input type="email" placeholder="your@vibe.com" required>
            </div>
            <div class="form-group" style="margin-top: 2rem;">
                <label style="font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; display: block;">What's on your mind?</label>
                <textarea rows="5" placeholder="Let's talk..." required></textarea>
            </div>
            <div style="text-align: right; margin-top: 3rem;">
                <button type="submit" class="btn-primary magnetic-btn" style="font-size: 1.2rem; padding: 1.2rem 3rem;">Send Message 🚀</button>
            </div>
        </form>
    </main>

    <footer>
        <p>Built for the modern mind. &copy; 2026</p>
    </footer>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
